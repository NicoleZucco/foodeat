<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="img/footer-mix.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <title>FOODEAT</title>
</head>

<body>
    
    <header class="cabecalho">

        <h2 class="cabecalho-titulo">FOODEAT</h2>

        <nav class="cabecalho-navegacao">
            <a class="cabecalho-navegacao-item" href="#">Início</a>
            <a class="cabecalho-navegacao-item" href="#">Menu</a>
            <a class="cabecalho-navegacao-item" href="#">Sobre</a>
        </nav>

    </header>

    <main class="conteudo">

        <section class="conteudo-principal">

                <div class="conteudo-principal-escrito">

                    <h1 class="conteudo-principal-escrito-titulo">Comida deliciosa <br> esperando por <br> VOCÊ!</h1>

                    <p class="conteudo-principal-escrito-paragrafo">Serviço de qualidade e ótimo sabor, sempre proporcionando uma experiência satisfatória. </p>

                    <div class="conteudo-principal-botao">
                        <button class="conteudo-principal-botao-1"> <a class="letra-botao-1" href="#">Cardápio</a></button>
                        <button class="conteudo-principal-botao-2 "><a class="letra-botao-2" href="#">Reserva</a></button>
                    </div>

                </div>

            <img class="conteudo-principal-imagem" src="img/header-menu.png" 
            alt="foto de um prato de salada">
        </section>


        <div class="card-titulo">
            <h3 class="card-titulo-h3">Top list - Our mainstay manu</h3>
        </div>

        <div class="card-container">

            <div class="card-um">

                    <div class="card-um-janela">
                        <img class="card-um-janela-imagem" src="img/main-carne.png" alt="" height="250px" width="250px">
                    </div>

                <div class="card-escrita" >
                    <p class="card-titulo-label"><b>Carne</b></p>
                    <p class="card-paragrafo-label">Lorem ipsum dolor.</p>
                </div>

            </div>



            <div class="card-dois">
                 <div class="card-dois-janela" >
                        <img class="card-dois-janela-imagem" src="img/main-frango.png" alt="" height="250px" width="250px">
                    </div>

                <div class="card-escrita">
                    <p class="card-titulo-label"><b>Frango</b></p>
                    <p class="card-paragrafo-label">Lorem ipsum dolor.</p>
                </div>
            </div>


            
            <div class="card-tres">
                 <div class="card-tres-janela">
                        <img class="card-tres-janela-imagem" src="img/main-batatas.png" alt="" height="250px" width="250px">
                    </div>

                <div class="card-escrita">
                    <p class="card-titulo-label" ><b>Batatas</b></p>
                    <p class="card-paragrafo-label">Lorem ipsum dolor.</p>
                </div>

            </div>

        </div>

    </main>


</body>
</html>
